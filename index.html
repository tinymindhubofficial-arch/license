<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civil Engineering Exam Practice Portal</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      // caused by certain environments, browser extensions, or polyfills.
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return fetchValue;
            },
            set: function(val) {
              fetchValue = val;
            }
          });
        } catch (e) {
          console.error('Failed to make window.fetch writable:', e);
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
